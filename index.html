<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCIL-ART STUDIO</title>
  <style>
    :root {
      --bg: #060d08;
      --bg2: #09170c;
      --surface: #0d1e11;
      --surface-2: #132a18;
      --ink: #b8ff9b;
      --ink-soft: #7cd96f;
      --border: #2f7f3a;
      --accent: #1f9e38;
      --accent-2: #146a28;
      --shadow: #041007;
      --danger: #ff3f45;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      scrollbar-width: thin;
      scrollbar-color: #2d7f3b #071109;
    }

    *::-webkit-scrollbar {
      width: 11px;
      height: 11px;
    }

    *::-webkit-scrollbar-track {
      background: #071109;
      border-left: 2px solid #103019;
      border-top: 2px solid #103019;
    }

    *::-webkit-scrollbar-thumb {
      background: #1f8634;
      border: 2px solid #0c2012;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", "Lucida Console", monospace;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(34, 88, 48, 0.34), transparent 42%),
        radial-gradient(circle at 85% 0%, rgba(27, 89, 41, 0.26), transparent 46%),
        repeating-linear-gradient(
          0deg,
          rgba(48, 144, 74, 0.07) 0,
          rgba(48, 144, 74, 0.07) 1px,
          transparent 1px,
          transparent 4px
        ),
        linear-gradient(180deg, var(--bg), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(1140px, 100%);
      border: 4px solid var(--border);
      background: var(--surface);
      box-shadow: 12px 12px 0 var(--shadow);
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border: 3px solid var(--border);
      background: #0f2717;
      padding: 12px 16px;
      box-shadow: 5px 5px 0 #041007;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: clamp(1rem, 2vw, 1.45rem);
      color: #d4ffbd;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 2px #5f0910, 0 0 8px rgba(255, 63, 69, 0.65);
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      0%,
      45% {
        opacity: 1;
      }
      46%,
      100% {
        opacity: 0.24;
      }
    }

    .live {
      border: 3px solid #7d1218;
      background: #d7282f;
      color: #fff;
      font-weight: 900;
      padding: 4px 10px;
      box-shadow: 3px 3px 0 #4f090d;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 16px;
    }

    .grid > .panel {
      min-width: 0;
    }

    .panel {
      border: 3px solid var(--border);
      background: var(--surface-2);
      box-shadow: 6px 6px 0 #06160b;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      text-transform: uppercase;
      border-bottom: 2px dashed #3f9d4f;
      padding-bottom: 8px;
      color: #d3ffc0;
    }

    .field {
      margin-bottom: 12px;
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.84rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    textarea,
    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      border: 3px solid var(--border);
      background: #071109;
      color: #ccffb8;
      font: inherit;
      padding: 8px;
      outline: none;
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .file-picker {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 8px;
      align-items: center;
    }

    .visually-hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      clip: rect(0 0 0 0);
      overflow: hidden;
    }

    .file-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--border);
      background: #17361f;
      color: #d1ffc2;
      font: inherit;
      font-weight: 800;
      text-transform: uppercase;
      padding: 8px 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #07110a;
      user-select: none;
    }

    .file-trigger:hover {
      background: #1d4a29;
    }

    .visually-hidden-file:focus + .file-trigger {
      outline: 2px solid #65e177;
      outline-offset: 2px;
    }

    .file-name {
      min-height: 40px;
      display: flex;
      align-items: center;
      border: 3px solid var(--border);
      background: #071109;
      color: #ccffb8;
      padding: 8px 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    textarea:focus,
    input[type="number"]:focus,
    input[type="file"]:focus,
    select:focus {
      border-color: #45be56;
      box-shadow: 0 0 0 2px rgba(69, 190, 86, 0.25);
    }

    textarea {
      resize: vertical;
      min-height: 86px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .slider-pack {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px;
      align-items: center;
    }

    .num-wrap {
      display: grid;
      grid-template-columns: 1fr 22px;
      border: 3px solid var(--border);
      background: #071109;
      height: 40px;
      overflow: hidden;
    }

    .num-wrap input[type="number"] {
      border: 0;
      height: 100%;
      padding: 8px;
      background: transparent;
      box-shadow: none;
    }

    .num-wrap input[type="number"]:focus {
      box-shadow: none;
      border-color: transparent;
    }

    .num-stepper {
      display: grid;
      grid-template-rows: 1fr 1fr;
      border-left: 2px solid var(--border);
      background: #102515;
    }

    .num-step-btn {
      border: 0;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      line-height: 1;
      font-size: 10px;
      font-weight: 900;
      color: #d1ffc2;
      background: #17361f;
      box-shadow: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .num-step-btn + .num-step-btn {
      border-top: 1px solid var(--border);
    }

    .num-step-btn:hover {
      background: #1d4a29;
      transform: none;
    }

    .num-step-btn:active {
      background: #246433;
      transform: none;
      box-shadow: none;
    }

    .neo-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 12px;
      background: linear-gradient(90deg, #0a170e, #12331b);
      border: 2px solid var(--border);
      box-shadow: inset 0 0 0 1px #0a1a0e;
    }

    .neo-slider:focus-visible {
      outline: 2px solid #65e177;
      outline-offset: 2px;
    }

    .neo-slider::-webkit-slider-runnable-track {
      height: 12px;
      background: linear-gradient(90deg, #0a170e, #12331b);
      border: 2px solid var(--border);
      box-shadow: inset 0 0 0 1px #0a1a0e;
    }

    .neo-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #b8ff9b;
      background: #1ea43a;
      box-shadow: 2px 2px 0 #071109;
      cursor: pointer;
    }

    .neo-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #b8ff9b;
      background: #1ea43a;
      box-shadow: 2px 2px 0 #071109;
      cursor: pointer;
    }

    .neo-slider::-moz-range-track {
      height: 12px;
      background: linear-gradient(90deg, #0a170e, #12331b);
      border: 2px solid var(--border);
      box-shadow: inset 0 0 0 1px #0a1a0e;
    }

    .neo-slider::-moz-range-progress {
      height: 12px;
      background: linear-gradient(90deg, #1d7f33, #27a542);
      border: 2px solid #2f7f3a;
    }

    .switch-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .md3-switch {
      position: relative;
      width: 52px;
      height: 32px;
      display: inline-flex;
      align-items: center;
    }

    .md3-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .md3-track {
      width: 52px;
      height: 32px;
      border-radius: 999px;
      border: 2px solid #4da55b;
      background: #0a160d;
      display: flex;
      align-items: center;
      transition: background 0.2s ease, border-color 0.2s ease;
      padding: 2px;
    }

    .md3-thumb {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #72d779;
      border: 2px solid #142f18;
      transform: translateX(0);
      transition: transform 0.2s ease, background 0.2s ease;
      box-shadow: 2px 2px 0 #081109;
    }

    .md3-switch input:checked + .md3-track {
      background: #1d7f33;
      border-color: #8ffd99;
    }

    .md3-switch input:checked + .md3-track .md3-thumb {
      transform: translateX(20px);
      background: #d4ffd1;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 3px solid var(--border);
      padding: 10px;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      background: #17361f;
      color: #d1ffc2;
      box-shadow: 4px 4px 0 #07110a;
      transition: transform 80ms ease;
    }

    button:hover {
      transform: translate(-1px, -1px);
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #07110a;
    }

    .primary {
      background: var(--accent-2);
    }

    .screen {
      border: 3px solid var(--border);
      background: #040b05;
      color: #8eff66;
      width: 100%;
      max-width: 100%;
      min-height: 560px;
      max-height: 70vh;
      padding: 12px;
      overflow-x: scroll;
      overflow-y: auto;
      box-shadow: inset 0 0 0 3px #0e2515;
      scrollbar-width: thin;
      scrollbar-color: #2d7f3b #071109;
    }

    .screen::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .screen::-webkit-scrollbar-track {
      background: #071109;
      border-left: 2px solid #103019;
    }

    .screen::-webkit-scrollbar-thumb {
      background: #1f8634;
      border: 2px solid #0c2012;
    }

    pre {
      margin: 0;
      display: inline-block;
      min-width: 100%;
      width: max-content;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 8px;
      line-height: 8px;
      letter-spacing: 0;
      white-space: pre;
    }

    .foot {
      margin-top: 12px;
      border: 3px solid var(--border);
      background: #0b1e11;
      box-shadow: 4px 4px 0 #06120a;
      padding: 8px 12px;
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 700;
      color: #9df093;
    }

    .hint {
      font-size: 0.76rem;
      opacity: 0.9;
      color: #8fdd87;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .screen {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>ASCIL-ART STUDIO</span>
      </div>
      <div class="live">LIVE</div>
    </header>

    <section class="grid">
      <aside class="panel">
        <h2>Входные данные</h2>

        <div class="field">
          <label for="mode">Режим конвертации</label>
          <select id="mode">
            <option value="text">Текст -> ASCIL-ART</option>
            <option value="image">Изображение -> ASCIL-ART</option>
          </select>
        </div>

        <div id="textFields">
          <div class="field">
            <label for="textInput">Исходный текст</label>
            <textarea id="textInput" placeholder="Например: HELLO, WORLD!">HELLO, WORLD!</textarea>
          </div>

          <div class="field">
            <label for="fontSize">Размер шрифта</label>
            <div class="slider-pack">
              <input id="fontSize" type="number" min="12" max="200" value="70" />
              <input id="fontSizeRange" class="neo-slider" type="range" min="12" max="200" value="70" />
            </div>
          </div>

          <div class="field">
            <label for="textWidth">Ширина (симв.)</label>
            <div class="slider-pack">
              <input id="textWidth" type="number" min="20" max="260" value="120" />
              <input id="textWidthRange" class="neo-slider" type="range" min="20" max="260" value="120" />
            </div>
          </div>
        </div>

        <div id="imageFields" style="display:none;">
          <div class="field">
            <label for="imageInput">Загрузить изображение</label>
            <div class="file-picker">
              <input id="imageInput" class="visually-hidden-file" type="file" accept="image/*" />
              <label for="imageInput" class="file-trigger">Загрузить</label>
              <span id="fileName" class="file-name">Файл не выбран</span>
            </div>
          </div>

          <div class="field">
            <label for="imgWidth">Ширина (симв.)</label>
            <div class="slider-pack">
              <input id="imgWidth" type="number" min="20" max="260" value="120" />
              <input id="imgWidthRange" class="neo-slider" type="range" min="20" max="260" value="120" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="density">Плотность символов</label>
          <select id="density">
            <option value="$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ">Высокая</option>
            <option value="@#S%?*+;:,. " selected>Средняя</option>
            <option value="#WMBRXVYIti+=;:,. ">Низкая</option>
          </select>
        </div>

        <div class="field">
          <div class="switch-line">
            <label for="invertToggle">Инверсия градации</label>
            <label class="md3-switch" for="invertToggle">
              <input id="invertToggle" type="checkbox" />
              <span class="md3-track"><span class="md3-thumb"></span></span>
            </label>
          </div>
          <div class="hint">Выключено = обычный, включено = инвертированный</div>
        </div>

        <div class="btns">
          <button id="convertBtn" class="primary">Конвертировать</button>
          <button id="copyBtn">Копировать</button>
          <button id="downloadTxtBtn">Скачать TXT</button>
          <button id="downloadPngBtn">Скачать PNG</button>
        </div>
      </aside>

      <section class="panel">
        <h2>Результат ASCIL-ART</h2>
        <div class="screen"><pre id="output"></pre></div>
      </section>
    </section>

    <footer class="foot">terminal green mode // realtime converter // text + image</footer>
  </main>

  <canvas id="workCanvas" style="display:none;"></canvas>

  <script>
    const mode = document.getElementById("mode");
    const textFields = document.getElementById("textFields");
    const imageFields = document.getElementById("imageFields");

    const textInput = document.getElementById("textInput");
    const imageInput = document.getElementById("imageInput");
    const fileName = document.getElementById("fileName");

    const fontSize = document.getElementById("fontSize");
    const fontSizeRange = document.getElementById("fontSizeRange");
    const textWidth = document.getElementById("textWidth");
    const textWidthRange = document.getElementById("textWidthRange");
    const imgWidth = document.getElementById("imgWidth");
    const imgWidthRange = document.getElementById("imgWidthRange");

    const density = document.getElementById("density");
    const invertToggle = document.getElementById("invertToggle");

    const convertBtn = document.getElementById("convertBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadTxtBtn = document.getElementById("downloadTxtBtn");
    const downloadPngBtn = document.getElementById("downloadPngBtn");

    const output = document.getElementById("output");
    const canvas = document.getElementById("workCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    let loadedImage = null;

    function attachCustomNumberSteppers() {
      const numberInputs = document.querySelectorAll(".slider-pack input[type='number']");
      numberInputs.forEach((input) => {
        if (input.parentElement && input.parentElement.classList.contains("num-wrap")) return;

        const wrap = document.createElement("div");
        wrap.className = "num-wrap";

        const stepper = document.createElement("div");
        stepper.className = "num-stepper";

        const up = document.createElement("button");
        up.type = "button";
        up.className = "num-step-btn";
        up.textContent = "▲";

        const down = document.createElement("button");
        down.type = "button";
        down.className = "num-step-btn";
        down.textContent = "▼";

        const host = input.parentElement;
        host.insertBefore(wrap, input);
        wrap.appendChild(input);
        stepper.appendChild(up);
        stepper.appendChild(down);
        wrap.appendChild(stepper);

        up.addEventListener("click", () => {
          input.stepUp();
          input.dispatchEvent(new Event("input", { bubbles: true }));
        });

        down.addEventListener("click", () => {
          input.stepDown();
          input.dispatchEvent(new Event("input", { bubbles: true }));
        });
      });
    }

    attachCustomNumberSteppers();

    function bindRangeNumber(rangeEl, numberEl) {
      rangeEl.addEventListener("input", () => {
        numberEl.value = rangeEl.value;
        if (mode.value === "text" || loadedImage) generate();
      });

      numberEl.addEventListener("input", () => {
        const v = Number(numberEl.value);
        if (Number.isFinite(v)) {
          const min = Number(numberEl.min || rangeEl.min || 0);
          const max = Number(numberEl.max || rangeEl.max || 1000);
          const clamped = Math.min(max, Math.max(min, v));
          numberEl.value = String(clamped);
          rangeEl.value = String(clamped);
          if (mode.value === "text" || loadedImage) generate();
        }
      });
    }

    bindRangeNumber(fontSizeRange, fontSize);
    bindRangeNumber(textWidthRange, textWidth);
    bindRangeNumber(imgWidthRange, imgWidth);

    mode.addEventListener("change", () => {
      const isText = mode.value === "text";
      textFields.style.display = isText ? "block" : "none";
      imageFields.style.display = isText ? "none" : "block";
      generate();
    });

    imageInput.addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (!file) {
        loadedImage = null;
        fileName.textContent = "Файл не выбран";
        generate();
        return;
      }
      fileName.textContent = file.name;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          loadedImage = img;
          if (mode.value === "image") generate();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    function brightnessToChar(brightness, charset, useInvert) {
      const normalized = brightness / 255;
      const value = useInvert ? normalized : 1 - normalized;
      const idx = Math.max(0, Math.min(charset.length - 1, Math.floor(value * (charset.length - 1))));
      return charset[idx];
    }

    function pixelsToAscii(width, height, imageData, charset, useInvert) {
      const lines = [];
      for (let y = 0; y < height; y++) {
        let line = "";
        for (let x = 0; x < width; x++) {
          const i = (y * width + x) * 4;
          const r = imageData[i];
          const g = imageData[i + 1];
          const b = imageData[i + 2];
          const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          line += brightnessToChar(luminance, charset, useInvert);
        }
        lines.push(line);
      }
      return lines.join("\n");
    }

    function renderTextToAscii() {
      const content = textInput.value || " ";
      const charWidth = Math.max(20, Number(textWidth.value) || 120);
      const size = Math.max(12, Number(fontSize.value) || 70);

      canvas.width = charWidth;
      canvas.height = Math.max(20, Math.floor(size * 1.5));

      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "black";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.font = "900 " + size + "px monospace";
      ctx.fillText(content, canvas.width / 2, Math.floor(canvas.height / 2));

      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      return pixelsToAscii(canvas.width, canvas.height, data, density.value, invertToggle.checked);
    }

    function renderImageToAscii() {
      if (!loadedImage) {
        return "[ Загрузите изображение, чтобы конвертировать его в ASCIL-ART ]";
      }

      const targetWidth = Math.max(20, Number(imgWidth.value) || 120);
      const sourceRatio = loadedImage.height / loadedImage.width;
      const targetHeight = Math.max(12, Math.floor(targetWidth * sourceRatio * 0.55));

      canvas.width = targetWidth;
      canvas.height = targetHeight;
      ctx.drawImage(loadedImage, 0, 0, targetWidth, targetHeight);

      const data = ctx.getImageData(0, 0, targetWidth, targetHeight).data;
      return pixelsToAscii(targetWidth, targetHeight, data, density.value, invertToggle.checked);
    }

    function generate() {
      output.textContent = mode.value === "text" ? renderTextToAscii() : renderImageToAscii();
    }

    function downloadTextFile() {
      const text = output.textContent || "";
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ascil-art.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadPngFile() {
      const text = output.textContent || "";
      const lines = text.split("\n");
      const maxLineLength = lines.reduce((max, line) => Math.max(max, line.length), 0);

      const exportCanvas = document.createElement("canvas");
      const exCtx = exportCanvas.getContext("2d");

      const fontSizePx = 12;
      const lineHeight = 14;
      exCtx.font = fontSizePx + "px Consolas, monospace";
      const charWidth = Math.ceil(exCtx.measureText("M").width);

      const padding = 18;
      exportCanvas.width = Math.max(320, maxLineLength * charWidth + padding * 2);
      exportCanvas.height = Math.max(180, lines.length * lineHeight + padding * 2);

      exCtx.fillStyle = "#040b05";
      exCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
      exCtx.fillStyle = "#8eff66";
      exCtx.font = fontSizePx + "px Consolas, monospace";
      exCtx.textBaseline = "top";

      lines.forEach((line, i) => {
        exCtx.fillText(line, padding, padding + i * lineHeight);
      });

      const url = exportCanvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = "ascil-art.png";
      a.click();
    }

    convertBtn.addEventListener("click", generate);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = "Скопировано";
        setTimeout(() => {
          copyBtn.textContent = "Копировать";
        }, 1200);
      } catch {
        copyBtn.textContent = "Ошибка";
        setTimeout(() => {
          copyBtn.textContent = "Копировать";
        }, 1200);
      }
    });

    downloadTxtBtn.addEventListener("click", downloadTextFile);
    downloadPngBtn.addEventListener("click", downloadPngFile);

    [textInput, density].forEach((el) => {
      el.addEventListener("input", () => {
        if (mode.value === "text" || loadedImage) generate();
      });
    });

    invertToggle.addEventListener("change", () => {
      if (mode.value === "text" || loadedImage) generate();
    });

    generate();
  </script>
</body>
</html>
